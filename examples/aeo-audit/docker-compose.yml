version: '3.8'

services:
  proxy:
    image: node:22-slim
    working_dir: /app
    command: ["node", "examples/aeo-audit/server.mjs"]
    ports:
      - "127.0.0.1:4320:4320"
    environment:
      - AEO_AUDIT_PORT=4320
      - AEO_AUDIT_HOST=0.0.0.0
      - UPSTREAM_URL=http://engine:8000
    volumes:
      - ../..:/app:ro
    depends_on:
      engine:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - floom-internal

  engine:
    build: .
    expose:
      - "8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser/.cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - floom-internal

networks:
  floom-internal:
    internal: true
