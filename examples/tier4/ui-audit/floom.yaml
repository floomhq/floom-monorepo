name: ui-audit
display_name: UI Audit
description: "Screenshot any URL at 4 viewports and score the UX across 7 dimensions using Gemini. Returns S1/S2/S3/S4 severity findings with an overall score."
creator: "@federicodeponte"
category: developer-tools
type: hosted
runtime: python3.12
build: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
run: uvicorn app:app --host 0.0.0.0 --port 8000
openapi_spec: /openapi.json
inputs_from: openapi
secrets:
  - GEMINI_API_KEY
memory_mb: 2048
timeout: 120s
