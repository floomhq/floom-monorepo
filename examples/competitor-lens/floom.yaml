name: Competitor Lens
slug: competitor-lens
description: Compare one HTTPS page against one competitor page and get a bounded positioning, pricing, and angle diff.
creator: floom
category: research
icon: binoculars
actions:
  analyze:
    label: Compare Competitor Pages
    description: |
      Fetches both pages in parallel (5s cap, 500KB max), extracts the
      readable text, and runs a single Gemini 2.5 Flash Lite call with
      strict JSON schema. Returns positioning, pricing, and unique-angle
      diffs in under 5 seconds.
    inputs:
      - name: your_url
        label: Your URL
        type: url
        required: true
        description: Your homepage or product page. https:// is added automatically. Max 200 chars.
        placeholder: floom.dev
      - name: competitor_url
        label: Competitor URL
        type: url
        required: true
        description: One competitor page on a different host. https:// is added automatically. Max 200 chars.
        placeholder: n8n.io
    outputs:
      - name: positioning
        label: Positioning
        type: table
      - name: pricing
        label: Pricing
        type: table
      - name: pricing_insight
        label: Pricing Insight
        type: text
      - name: unique_to_you
        label: Unique To You
        type: json
      - name: unique_to_competitor
        label: Unique To Competitor
        type: json
      - name: meta
        label: Meta
        type: json

secrets_needed:
  - GEMINI_API_KEY

runtime: python
image: floom/competitor-lens:latest
memory_mb: 512
timeout: 30s
manifest_version: "2.0"
