# Launch Scorecards — proxied-mode examples.
# Start the upstream first: node examples/launch-scorecards/server.mjs
# Then point Floom at this file via FLOOM_APPS_CONFIG.

apps:
  - slug: linkedin-roaster
    type: proxied
    openapi_spec_url: http://localhost:4120/linkedin-roaster/openapi.json
    display_name: LinkedIn Roaster
    description: "Paste a LinkedIn profile URL and get sharper positioning, headline, About rewrite, and post ideas."
    category: marketing

  - slug: yc-pitch-deck-critic
    type: proxied
    openapi_spec_url: http://localhost:4120/yc-pitch-deck-critic/openapi.json
    display_name: YC Pitch Deck Critic
    description: "Upload a pitch deck outline or text export and return a focused YC-style diagnosis."
    category: fundraising

  - slug: readme-roaster
    type: proxied
    openapi_spec_url: http://localhost:4120/readme-roaster/openapi.json
    display_name: README Roaster
    description: "Paste a GitHub repo URL and get a roast of your README with clarity score, top issues, and a rewritten opener."
    category: developer-tools

  - slug: cold-email-roaster
    type: proxied
    openapi_spec_url: http://localhost:4120/cold-email-roaster/openapi.json
    display_name: Cold Email Roaster
    description: "Paste your cold email and get a cringe score, top issues, and a rewritten subject line and body."
    category: marketing

  - slug: tweet-predictor
    type: proxied
    openapi_spec_url: http://localhost:4120/tweet-predictor/openapi.json
    display_name: Tweet Predictor
    description: "Paste a tweet draft and get a predicted engagement level, top issues, a sharper rewrite, and an alternative angle."
    category: marketing
