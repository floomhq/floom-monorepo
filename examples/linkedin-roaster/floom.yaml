name: LinkedIn Profile Roaster
slug: linkedin-roaster
description: Paste a LinkedIn profile URL or profile text and get a brutally honest roast with specific rewrites for headline, about intro, and one experience bullet.
creator: floom
category: writing
icon: flame
actions:
  roast:
    label: Roast Profile
    description: Cached demo URL path plus one Gemini 2.5 Flash Lite call for pasted profile text.
    inputs:
      - name: url
        label: LinkedIn URL
        type: url
        required: true
        placeholder: https://linkedin.com/in/federicodeponte
        description: LinkedIn profile URL. The launch demo URL is cached for sub-10s cold runs.
    outputs:
      - name: roast
        label: Roast
        type: table
      - name: rewrites
        label: Rewrites
        type: table
      - name: top_tip
        label: Top Tip
        type: text
      - name: model
        label: Model
        type: text
      - name: dry_run
        label: Dry Run
        type: text
      - name: cache_hit
        label: Cache Hit
        type: text
runtime: python
python_dependencies:
  - google-genai>=1.64.0,<2
node_dependencies: {}
secrets_needed:
  - GEMINI_API_KEY
output_type: json
timeout: 10s
manifest_version: "2.0"
