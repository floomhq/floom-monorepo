# Combined apps.yaml for the 5 proxied-mode examples in v0.3.0.
#
# These are the W2.4a conversions: docker-free replacements for the original
# docker-hosted bundled apps (blast-radius, claude-wrapped, dep-check,
# hook-stats, session-recall). Each runs as a standalone Node.js HTTP
# sidecar with its own OpenAPI 3.0 spec.
#
# Usage:
#   # 1. Start all 5 sidecars (in 5 shells, or use docker-compose)
#   node examples/blast-radius/server.mjs &
#   node examples/claude-wrapped/server.mjs &
#   node examples/dep-check/server.mjs &
#   node examples/hook-stats/server.mjs &
#   node examples/session-recall/server.mjs &
#
#   # 2. Boot Floom pointed at this file
#   FLOOM_APPS_CONFIG=examples/apps-proxied.yaml \
#     DATA_DIR=/tmp/floom-proxied \
#     node apps/server/dist/index.js
#
#   # 3. All 5 apps show up at /api/hub

apps:
  - slug: blast-radius
    type: proxied
    openapi_spec_url: http://localhost:4113/openapi.json
    display_name: Blast Radius
    description: "Find all files affected by your changes. Clone a public git repo and report files touched by a branch diff."
    category: developer-tools

  - slug: claude-wrapped
    type: proxied
    openapi_spec_url: http://localhost:4111/openapi.json
    display_name: Claude Wrapped
    description: "Spotify Wrapped for Claude Code. Visualize your AI coding stats from session transcripts."
    category: productivity

  - slug: dep-check
    type: proxied
    openapi_spec_url: http://localhost:4114/openapi.json
    display_name: Dep Check
    description: "Find dead imports in your project. Clone a public git repo and list imports that reference files no longer there."
    category: developer-tools

  - slug: hook-stats
    type: proxied
    openapi_spec_url: http://localhost:4110/openapi.json
    display_name: Hook Stats
    description: "Analyze your Claude Code bash-commands.log. Top commands, git stats, per-day activity."
    category: productivity

  - slug: session-recall
    type: proxied
    openapi_spec_url: http://localhost:4112/openapi.json
    display_name: Session Recall
    description: "Search and analyze Claude Code session transcripts. Keyword search, recent messages, and retry-loop report."
    category: productivity
