# Gitleaks config — allowlist test fixtures and example apps.
# Post-scrub 2026-04-23: fingerprint-based .gitleaksignore insufficient when
# force-pushing many branches (each branch has distinct post-scrub SHAs for
# the same files). Path-based allowlist is stable across branches.

[extend]
useDefault = true

[allowlist]
description = "Test fixtures, example demo apps, and public-by-design instrumentation tokens"
paths = [
  '''^test/stress/test-hub-runs-auth\.mjs$''',
  '''^test/stress/test-w31-auth-boundary\.mjs$''',
  '''^test/stress/test-fast-apps\.mjs$''',
  '''^test/stress/test-workspace-secrets\.mjs$''',
  '''^test/stress/test-workspace-secrets-backfill\.mjs$''',
  '''^test/stress/test-launch-demo-http-smoke\.mjs$''',
  '''^test/stress/test-proxied-response-hardening\.mjs$''',
  '''^examples/fast-apps/README\.md$''',
  '''^examples/fast-apps/server\.mjs$''',
  '''^packages/hub-smoke/tests/fixtures\.ts$''',
  '''^apps/web/src/lib/sample-inputs\.ts$''',
  # Canonical env files — Sentry DSN, PostHog project API key (phc_*), and
  # OAuth client IDs are designed to be public (they ship in browser bundles).
  # Secret values stay in shell-env passthrough — see redeploy-{mvp,prod,preview}.sh.
  '''^scripts/mvp\.env\.canonical$''',
  '''^scripts/prod\.env\.canonical$''',
  '''^scripts/preview\.env\.canonical$''',
]
