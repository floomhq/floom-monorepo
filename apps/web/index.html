    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts non-render-blocking. print->all swap + noscript
         fallback. Saved ~760ms FCP/LCP on mobile Lighthouse. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Floom",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "description": "The protocol + runtime for agentic work. Build agents, workflows, and scripts with AI and deploy them as MCP, API, schedule, webhook, or UI — production-grade, live in 30 seconds. Open source, self-host via Docker or run on Floom Cloud.",
      "url": "https://floom.dev/",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Person", "name": "Federico De Ponte", "url": "https://github.com/federicodeponte" }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- SPA fallback. Rendered before React hydrates so crawlers and curl
           see the locked hero copy. Matches landing.floom.dev exactly. -->
      <div style="display:none" data-spa-fallback>
        <h1>The protocol + runtime for agentic work.</h1>
        <p>Build agents, workflows, and scripts with AI. Deploy as MCP, API, schedule, webhook, or UI &mdash; production-grade, live in 30 seconds.</p>
        <p><a href="/apps">Try an app</a> &middot; <a href="/build">Ship an app</a></p>

    </div>
    <noscript>
      <h1>The protocol + runtime for agentic work.</h1>
      <p>Build agents, workflows, and scripts with AI. Deploy as MCP, API, schedule, webhook, or UI &mdash; production-grade, live in 30 seconds.</p>
      <p><a href="/apps">Try an app</a> &middot; <a href="/build">Ship an app</a></p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
