<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" role="img" aria-label="Floom">
  <!--
    Email header lockup. 400x120 so a 200x60 <img> at 2x stays crisp on
    retina without looking chunky. Flat emerald-700 mark + Inter sans-serif
    wordmark matching v26 brand (dropped Georgia/Fraunces; Inter 800 is
    canonical display). The mark reuses the floom "forward-arrow" shape from
    /apps/web/public/floom-mark.svg so the look-and-feel stays in sync
    between the site and the email. No drop-shadows or filters — those
    render as grey blocks in Outlook.
  -->
  <!-- mark: scale the 100x100 floom mark to ~72x72, vertically centered in 120h -->
  <g transform="translate(28, 24) scale(0.72)">
    <path
      d="M32 26 h20 l22 22 a3 3 0 0 1 0 4 l-22 22 h-20 a6 6 0 0 1 -6 -6 v-36 a6 6 0 0 1 6 -6 z"
      fill="#047857"
    />
  </g>
  <!-- wordmark: "floom" in Inter 900, v26 canonical display font -->
  <text
    x="118"
    y="78"
    font-family="Inter, system-ui, sans-serif"
    font-size="58"
    font-weight="900"
    letter-spacing="-1"
    fill="#1c1a14"
  >floom</text>
  <!-- trailing emerald dot: unified lockup (#980). Approx x = 118 + 5*58*0.55 ≈ 277; nudge via dx -->
  <circle cx="302" cy="72" r="7" fill="#10b981" />
</svg>
