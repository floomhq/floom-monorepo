version: "3.9"

# Floom self-hosted — reference compose file for v0.3.0+.
# Usage:
#   1. Copy docker/apps.yaml.example to docker/apps.yaml and edit it.
#   2. docker compose -f docker/docker-compose.yml up -d
#   3. Open http://localhost:3051
#
# Proxied-only by default. The 15 historical hosted apps (flyfast, bouncer,
# blast-radius, ...) are opt-in via FLOOM_SEED_APPS=true AND mounting
# /var/run/docker.sock. See docs/SELF_HOST.md.

services:
  floom:
    image: ghcr.io/floomhq/floom:v0.3.0
    ports:
      - "3051:3051"
    volumes:
      # Persist SQLite data and per-app state across restarts
      - floom_data:/data
      # Mount your apps.yaml config (optional but usually what you want)
      - ./apps.yaml:/app/config/apps.yaml:ro
      # Uncomment ONLY if FLOOM_SEED_APPS=true and you trust the network:
      # mounting docker.sock grants host root.
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: "3051"
      DATA_DIR: "/data"
      FLOOM_APPS_CONFIG: "/app/config/apps.yaml"
      # Uncomment and choose a long random string to gate /api/*, /mcp/*,
      # and /p/* behind a shared bearer token. /api/health stays open.
      # FLOOM_AUTH_TOKEN: "change_me_to_a_long_random_string"
      #
      # Uncomment to opt into the 15 bundled docker apps (requires
      # docker.sock mount above).
      # FLOOM_SEED_APPS: "true"
      #
      # Seven deterministic utility apps (uuid, password, hash, base64,
      # json-format, jwt-decode, word-count) are bundled as a Node.js
      # sidecar and forked at boot on localhost:$FAST_APPS_PORT (default
      # 4200). Set FLOOM_FAST_APPS=false to disable.
      # FLOOM_FAST_APPS: "false"
      # FAST_APPS_PORT: "4200"
      #
      # Raise the ingest cap for huge specs (Stripe = 587, GitHub = 1107).
      # Set to 0 for unlimited.
      # FLOOM_MAX_ACTIONS_PER_APP: "500"
      #
      #
      # Transactional email (password reset, welcome). Without it, emails
      # are logged to stdout instead of delivered. Floom's own auth flows
      # look for RESEND_API_KEY at the application level; it's also
      # forwarded to any app whose apps.yaml 'secrets:' list includes it.
      # RESEND_API_KEY: "re_..."
      # RESEND_FROM: "Floom <noreply@send.floom.dev>"
      #
      # Observability (optional; all three are no-ops when unset):
      # - SENTRY_SERVER_DSN: error tracking for server exceptions
      # - VITE_SENTRY_WEB_DSN: error tracking for the browser bundle (BUILD-TIME,
      #   must be baked at image build with --build-arg, not at container run)
      # - DISCORD_ALERTS_WEBHOOK_URL: Discord channel webhook for 5xx alerts,
      #   repeated-429 abuse signals, unhandledRejection / uncaughtException.
      #   Rate-limited to 1 alert / minute / title so a regression storm
      #   collapses to a steady stream instead of a firehose.
      # See docs/OBSERVABILITY_SETUP.md for the full wiring walk-through.
      # SENTRY_SERVER_DSN: ""
      # DISCORD_ALERTS_WEBHOOK_URL: ""
      #
      # Secrets for your apps (add as many as needed — any env var matching
      # a name in apps.yaml 'secrets:' list is picked up as a per-app secret).
      # OPENAI_API_KEY: "sk-..."
      # STRIPE_SECRET_KEY: "sk_..."
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3051/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  floom_data:
