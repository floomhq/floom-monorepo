name: Deploy preview

# Auto-deploy preview.floom.dev on every push to main.
# Prod (floom.dev) is NEVER touched by this workflow — it is deployed
# manually via the separate `Deploy prod` workflow (deploy-prod.yml)
# with workflow_dispatch, AFTER visual verification on preview.floom.dev.
# See scripts/ops/README.md for the 4-step ship workflow.
#
# Flow: push main -> wait for CI (typecheck + test) to pass -> SSH to AX41 ->
# the forced-command deploy key runs /usr/local/sbin/floom-deploy-preview.sh
# which rebuilds the image, rolls the preview container with --no-deps,
# health-checks :3052, runs launch-app real-run gate checks, and rolls back
# to the previous compose if health or gate checks fail. Prod compose +
# container are not touched.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: if a second push lands while we are deploying, queue it
# instead of cancelling. We want the most-recent main to end up live on
# preview, not a half-finished rebuild.
concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Typecheck
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc  # v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Typecheck'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success
      - name: Wait for Test
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc  # v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Test'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success

  deploy:
    name: Deploy to AX41 preview
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - name: SSH to AX41 (forced-command runs preview deploy script)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.AX41_HOST }}
          username: ${{ secrets.AX41_USER }}
          key: ${{ secrets.AX41_DEPLOY_KEY }}
          # The authorized_keys forced-command ignores whatever we send here
          # and runs /usr/local/sbin/floom-deploy-preview.sh. We pass a
          # placeholder just so the action has something to transmit.
          script: "deploy"
          timeout: 15m
          command_timeout: 15m
